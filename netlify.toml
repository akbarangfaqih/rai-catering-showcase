# Netlify configuration for Rai Catering
# Aman untuk preview Lovable — file ini hanya digunakan saat deploy ke Netlify.

[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback — mencegah error 404 saat refresh / deep link
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
